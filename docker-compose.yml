version: "3"

services:
  app:
    build: .
    container_name: node_app
    ports:
      - "9000:3000"
    depends_on:
      - mongo

  mongo:
    image: mongo
    container_name: mongo_db
    ports:
      - "27017:27017"

  nginx:
    image: nginx
    container_name: nginx_server
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app